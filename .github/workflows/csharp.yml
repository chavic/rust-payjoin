name: Build and Test CSharp
on:
  workflow_run:
    workflows: ["Flake maintenance"]
    types: [requested]
    branches:
      - "update_flake_lock_action"
  pull_request:
    paths:
      - payjoin-ffi/**
env:
  RUSTUP_TOOLCHAIN: 1.85

jobs:
  build-csharp-and-test:
    name: "Build and test csharp"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: payjoin-ffi/csharp
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-15-intel
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Use cache
        uses: Swatinem/rust-cache@v2

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Verify .NET SDK
        run: |
          dotnet --version
          dotnet --list-sdks

      - name: Generate bindings and binaries (unix)
        if: matrix.os != 'windows-latest'
        run: bash ./scripts/generate_bindings.sh

      - name: Generate bindings and binaries (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/generate_bindings.ps1

      - name: Run tests
        run: dotnet test Payjoin.Tests.csproj --logger "console;verbosity=minimal"

      - name: Build NuGet native asset (unix)
        if: matrix.os != 'windows-latest'
        run: |
          PAYJOIN_FFI_RID=${{ matrix.rid }} bash ./scripts/build_nuget_native.sh

      - name: Build NuGet native asset (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $env:PAYJOIN_FFI_RID = "${{ matrix.rid }}"
          ./scripts/build_nuget_native.ps1

      - name: Upload NuGet native asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: payjoin-ffi/csharp/artifacts/runtimes/${{ matrix.rid }}/native/*
          if-no-files-found: error

  pack-nuget:
    name: "Pack C# NuGet package"
    runs-on: ubuntu-latest
    needs: build-csharp-and-test
    defaults:
      run:
        working-directory: payjoin-ffi/csharp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Use cache
        uses: Swatinem/rust-cache@v2

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Download native assets
        uses: actions/download-artifact@v4
        with:
          path: payjoin-ffi/csharp/artifacts/downloaded

      - name: Assemble RID assets
        run: |
          mkdir -p artifacts/runtimes/linux-x64/native
          mkdir -p artifacts/runtimes/osx-x64/native
          mkdir -p artifacts/runtimes/win-x64/native
          cp artifacts/downloaded/linux-x64/* artifacts/runtimes/linux-x64/native/
          cp artifacts/downloaded/osx-x64/* artifacts/runtimes/osx-x64/native/
          cp artifacts/downloaded/win-x64/* artifacts/runtimes/win-x64/native/

      - name: Generate production bindings
        run: |
          PAYJOIN_FFI_FEATURES= PAYJOIN_FFI_PROFILE=release bash ./scripts/generate_bindings.sh

      - name: Pack NuGet package
        run: dotnet pack Payjoin.csproj --configuration Release --output artifacts/packages

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: payjoin-csharp-nuget-package
          path: payjoin-ffi/csharp/artifacts/packages/*.nupkg
          if-no-files-found: error

  smoke-nuget:
    name: "Smoke test C# NuGet package"
    runs-on: ${{ matrix.os }}
    needs: pack-nuget
    defaults:
      run:
        working-directory: payjoin-ffi/csharp
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-15-intel
            rid: osx-x64
          - os: windows-latest
            rid: win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: payjoin-csharp-nuget-package
          path: payjoin-ffi/csharp/artifacts/packages

      - name: Run package smoke test
        shell: bash
        run: bash ./scripts/smoke_nuget_package.sh artifacts/packages 0.24.0-preview.1 ${{ matrix.rid }}
